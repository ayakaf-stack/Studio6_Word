{% extends "base.html" %}
{% block title %}退会{% endblock %}
{% block main %}
    <h1>退会画面</h1>
    退会するユーザー:{{user_name}}
    <form action="{{ url_for('unregister') }}" method="post">
        <div>
            <input type="checkbox" id="check_" required>
            <label for="check_">退会すると作成した文章、いいねが全て削除されることに同意します。</label>
        </div>
        <div>
            <label for="password">パスワード</label>
            <input type="password" name="password" id="password" placeholder="パスワード" required>
        </div>
        <div>
            <button type="submit">退会する</button>
        </div>
    </form>
    <a href="/mypage">戻る</a>
{% endblock %}
