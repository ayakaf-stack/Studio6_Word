<h1>新規登録</h1>

<form action="{{ url_for('register') }}" method="post">
    <div>
        <label for="user_name">ユーザー名</label>
        <input type="text" name="user_name" maxlength="255" id="user_name" required >
    </div>
    <div>
        <label for="email">メールアドレス</label>
        <input type="email" name="email" maxlength="255" id="email" required >
    </div>
    <div>
        <label for="password">パスワード</label>
        <input type="password" name="password" minlength="8" maxlength="16" id="password" required >
    </div>
    
    <input type="submit" value="新規登録">
</form>
